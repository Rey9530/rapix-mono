nodeLinker: node-modules

enableGlobalCache: false

enableTelemetry: false

# Permitir scripts de postinstall para paquetes que lo requieren (Prisma descarga binarios, bcrypt compila nativos)
enableScripts: true

# Permitir dependencias instaladas desde repositorios git aprobados.
# Baileys (libsignal) se distribuye como tarball desde GitHub.
approvedGitRepositories:
  - "https://github.com/whiskeysockets/libsignal-node.git"
  - "https://github.com/WhiskeySockets/libsignal-node.git"
