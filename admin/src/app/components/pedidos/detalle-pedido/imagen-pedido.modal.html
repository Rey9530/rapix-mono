<div class="modal-header">
  <h5 class="modal-title">{{ titulo }}</h5>
  <button
    type="button"
    class="btn-close"
    aria-label="Cerrar"
    (click)="modal.dismiss()"
  ></button>
</div>
<div class="modal-body p-0 contenedor-imagen">
  <img [src]="urlImagen" [alt]="titulo" class="imagen-completa" />
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="modal.close()">
    Cerrar
  </button>
</div>
