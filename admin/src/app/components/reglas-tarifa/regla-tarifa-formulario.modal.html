<div class="modal-header">
  <h5 class="modal-title">
    {{ esEdicion ? "Editar regla de tarifa" : "Nueva regla de tarifa" }}
  </h5>
  <button
    type="button"
    class="btn-close"
    aria-label="Cerrar"
    (click)="modal.dismiss()"
  ></button>
</div>

<div class="modal-body">
  @if (cargando) {
    <div class="text-center p-4">
      <div class="spinner-border text-primary"></div>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label">Nombre *</label>
          <input
            class="form-control"
            type="text"
            formControlName="nombre"
            maxlength="120"
            placeholder="Ej: Tarifa estándar"
          />
        </div>

        <div class="col-md-4">
          <label class="form-label">Modo de facturación *</label>
          <select class="form-select" formControlName="modoFacturacion">
            <option value="POR_ENVIO">POR_ENVIO</option>
            <option value="PAQUETE">PAQUETE</option>
          </select>
        </div>

        @if (esModoEnvio) {
          <div class="col-md-6">
            <label class="form-label">Precio por envío *</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input
                class="form-control"
                type="number"
                step="0.01"
                min="0"
                formControlName="precioPorEnvio"
                placeholder="0.00"
              />
            </div>
            <small class="text-muted">
              Importe que se cobra por cada envío individual.
            </small>
          </div>
        } @else {
          <div class="col-md-6">
            <label class="form-label">Tamaño del paquete *</label>
            <input
              class="form-control"
              type="number"
              min="1"
              formControlName="tamanoPaquete"
              placeholder="Ej: 50"
            />
            <small class="text-muted">Cantidad de envíos incluidos.</small>
          </div>
          <div class="col-md-6">
            <label class="form-label">Precio del paquete *</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input
                class="form-control"
                type="number"
                step="0.01"
                min="0"
                formControlName="precioPaquete"
                placeholder="0.00"
              />
            </div>
          </div>
        }

        <div class="col-md-6">
          <label class="form-label">Válida desde</label>
          <input
            class="form-control"
            type="date"
            formControlName="validaDesde"
          />
          <small class="text-muted">Si se omite, se usa la fecha actual.</small>
        </div>

        <div class="col-md-6">
          <label class="form-label">Válida hasta</label>
          <input
            class="form-control"
            type="date"
            formControlName="validaHasta"
          />
          <small class="text-muted">Vacío = sin vencimiento.</small>
        </div>

        <div class="col-12">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              formControlName="activa"
              id="checkActiva"
            />
            <label class="form-check-label" for="checkActiva">
              Regla activa
            </label>
          </div>
        </div>
      </div>
    </form>
  }
</div>

<div class="modal-footer">
  <button
    type="button"
    class="btn btn-secondary"
    [disabled]="enviando"
    (click)="modal.dismiss()"
  >
    Cancelar
  </button>
  <button
    type="button"
    class="btn btn-primary"
    [disabled]="enviando || form.invalid"
    (click)="guardar()"
  >
    {{ enviando ? "Guardando..." : esEdicion ? "Actualizar" : "Crear" }}
  </button>
</div>
