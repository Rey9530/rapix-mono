<div class="modal-header">
  <h4 class="modal-title">Desvincular WhatsApp</h4>
  <button
    type="button"
    class="btn-close"
    aria-label="Cerrar"
    (click)="modal.dismiss()"
  ></button>
</div>
<div class="modal-body">
  <p class="mb-2">
    Vas a cerrar la sesion de WhatsApp del panel. La sesion se desvinculara del
    telefono y tendras que escanear un nuevo QR para volver a conectar.
  </p>
  <p class="text-muted small mb-0">
    Las notificaciones automaticas que dependen de WhatsApp tambien dejaran de
    enviarse hasta que vuelvas a vincular un telefono.
  </p>
</div>
<div class="modal-footer">
  <button
    type="button"
    class="btn btn-light"
    (click)="modal.dismiss()"
  >
    Cancelar
  </button>
  <button
    type="button"
    class="btn btn-danger"
    (click)="modal.close(true)"
  >
    Desvincular
  </button>
</div>
