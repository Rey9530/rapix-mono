name: app_rider
description: "App móvil del repartidor (Rapix Delivery)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado y navegación
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Red y storage
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  # Modelos / serialización
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilidades
  intl: ^0.20.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0

  # Geolocalización (8.5 / 8.6)
  geolocator: ^13.0.2

  # Mapa (8.4)
  mapbox_maps_flutter: ^2.5.1
  flutter_polyline_points: ^2.1.0

  # Captura comprobante (8.6)
  image_picker: ^1.1.2
  signature: ^5.5.0
  path_provider: ^2.1.5

  # Push (8.9)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
