<app-card
  [cardClass]="'height-equal'"
  [headerTitle]="'Vertical Double Divider'"
  [border]="true"
  [padding]="false"
  [cardBodyClass]="'main-divider'"
>
  <p class="mb-0 mt-1" header5>
    Use <code>double-divider</code> and<code> vertical-line</code> class for
    double divider.
  </p>

  <div class="row g-sm-2 d-flex double-divider gy-4">
    @for (divider of verticalDoubleDivider; track divider) {
      <div class="col-sm-3 col-6">
        <div class="vertical-divider">
          <div class="vertical-line bg-{{ divider.color }}"></div>
          @if (divider.icon) {
            <app-svg-icon
              [icon]="divider.icon"
              [class]="'my-2 ' + divider.icon_class"
            />
          } @else {
            <p
              class="my-2"
              [class]="{
                border: divider.border,
                'rounded-pill': divider.border && divider.rounded,
              }"
              [class]="
                divider.border
                  ? 'border-' + divider.color
                  : 'txt-' + divider.color
              "
            >
              {{ divider.color | titlecase }}
            </p>
          }
          <div class="vertical-line bg-{{ divider.color }}"></div>
        </div>
      </div>
    }
  </div>
</app-card>
