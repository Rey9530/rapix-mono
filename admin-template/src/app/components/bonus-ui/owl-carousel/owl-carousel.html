<div class="container-fluid">
  <h4 class="mb-3 common-title">Carousel with Bootstrap</h4>
  <div class="row">
    <div class="col-xl-6 col-12">
      <app-slides-only />
    </div>
    <div class="col-xl-6 col-12">
      <app-with-controls />
    </div>
    <div class="col-xl-6 col-12">
      <app-with-indicators />
    </div>
    <div class="col-xl-6 col-12">
      <app-with-caption />
    </div>
    <div class="col-xl-6 col-12">
      <app-cross-fade />
    </div>
    <div class="col-xl-6 col-12">
      <app-individual-item />
    </div>
    <div class="col-xl-6 col-12">
      <app-disable-touch />
    </div>
    <div class="col-xl-6 col-12">
      <app-dark-variant />
    </div>
  </div>
  <h4 class="mb-3 mt-sm-5 mt-3 common-title">Swiper Sliders</h4>
  <div class="row">
    <div class="col-xl-6 col-12">
      <app-vertical-slider />
    </div>
    <div class="col-xl-6 col-12">
      <app-nested-swiper />
    </div>
    <div class="col-xl-6 col-12">
      <app-mouse-wheel-variant />
    </div>
    <div class="col-xl-6 col-12">
      <app-auto-play-variant />
    </div>
  </div>
</div>
