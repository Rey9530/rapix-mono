<div class="container-fluid">
  <div class="faq-wrap">
    <div class="row">
      <app-common-faq-details [details]="faqDetails" />

      <div class="col-lg-12">
        <app-faq-question-answer />
      </div>
      <div class="col-lg-12">
        <app-common-featured-tutorials
          [details]="faqFeaturedTutorial"
          [headerTitle]="'Featured Tutorials'"
        />
      </div>
      <div class="col-lg-12">
        <app-common-article-video
          [details]="faqArticlesAndVideos"
          [headerTitle]="'Latest Articles and Videos'"
          [faqClass]="'faq-wrapper'"
        />
      </div>
    </div>
  </div>
</div>
