<div class="container-fluid">
  <div class="row">
    <div class="col-sm-12">
      <app-card>
        <div class="ngx-editor">
          <div class="NgxEditor__Wrapper">
            <ngx-editor-menu [editor]="editor" />
            <ngx-editor
              [editor]="editor"
              [ngModel]="html"
              [disabled]="false"
              [placeholder]="'Type here...'"
            />
          </div>
        </div>
      </app-card>
    </div>
  </div>
</div>
