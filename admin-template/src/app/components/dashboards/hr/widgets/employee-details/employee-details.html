<app-card [cardClass]="'widget-11 widget-hover'">
  <div class="common-align justify-content-start">
    <div class="analytics-tread bg-light-{{ details()?.color }}">
      <app-svg-icon
        [icon]="details()?.icon"
        [class]="'fill-' + details()?.color"
      />
    </div>
    <div>
      <span class="c-o-light">{{ details()?.title }}</span>
      <h4 class="counter">{{ details()?.value | number }}</h4>
    </div>
  </div>
</app-card>
